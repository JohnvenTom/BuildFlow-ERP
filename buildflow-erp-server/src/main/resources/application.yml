server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:buildflow_erp}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.buildflow.erp.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置（密钥从环境变量读取，提供开发默认值）
jwt:
  secret: ${JWT_SECRET:BuildFlowErpSecretKey2026ForJwtTokenGeneration}
  expiration: ${JWT_EXPIRATION:86400000}

# 运行环境（dev/test/prod）


# Knife4j文档配置（生产环境关闭）
knife4j:
  enable: ${KNIFE4J_ENABLE:true}
  production: ${KNIFE4J_PRODUCTION:false}

# 接口签名密钥
api:
  sign:
    secret: ${API_SIGN_SECRET:BuildFlowApiSignSecret2026}
    timeout: ${API_SIGN_TIMEOUT:300000}

logging:
  level:
    com.buildflow.erp: ${LOG_LEVEL:debug}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
